<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengesahan Pengguna Baru</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        // HANYA PENYELARAS INOVASI (Atau peranan tertinggi) YANG DIBENARKAN MASUK
        const userPeranan = sessionStorage.getItem("peranan") || "";
        if (sessionStorage.getItem("userLulus") !== "YA" || !userPeranan.toUpperCase().includes("INOVASI")) {
            alert("Akses Ditolak! Halaman ini dikhususkan untuk Penyelaras Inovasi sahaja.");
            window.location.href = "dashboard.html"; 
        }
    </script>
</head>
<body class="bg-gray-100 p-6 font-sans">

    <div class="max-w-5xl mx-auto">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm border border-gray-200 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">🔐 Pengesahan Pengguna</h1>
                <p class="text-sm text-gray-500 mt-1">Senarai Penyelaras Jabatan yang menunggu kelulusan anda.</p>
            </div>
            <div class="flex gap-2">
                <a href="dashboard.html" class="bg-gray-600 hover:bg-gray-700 text-white px-5 py-2.5 rounded-lg font-semibold transition shadow-md">
                    &larr; Kembali
                </a>
            </div>
        </div>

        <div id="statusMesej" class="hidden mb-4 p-4 rounded text-center text-sm font-semibold border"></div>

        <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-blue-600 text-white text-sm uppercase">
                            <th class="p-4 border-b">No. IC</th>
                            <th class="p-4 border-b">Nama Penuh</th>
                            <th class="p-4 border-b">Jabatan</th>
                            <th class="p-4 border-b">Peranan</th>
                            <th class="p-4 border-b text-center">Tindakan</th>
                        </tr>
                    </thead>
                    <tbody id="isiJadual" class="text-gray-700 text-sm bg-white">
                        <tr><td colspan="5" class="p-10 text-center font-semibold text-gray-500 animate-pulse">⏳ Sedang memuatkan senarai...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // ⚠️ MASUKKAN URL WEB APP ANDA DI BAWAH INI
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxh9pAf8LKl5CU7HFcr5TfKZYy1O5XeFhAX9GgiojzCvB81IOfnNBOuzQoV7zntObI/exec"; 

        function ambilDataPending() {
            const tbody = document.getElementById('isiJadual');
            tbody.innerHTML = `<tr><td colspan="5" class="p-10 text-center font-semibold text-blue-500 animate-pulse">⏳ Menyemak pangkalan data...</td></tr>`;

            const fetchUrl = SCRIPT_URL.includes('?') ? `${SCRIPT_URL}&action=ambilPenggunaPending` : `${SCRIPT_URL}?action=ambilPenggunaPending`;

            fetch(fetchUrl)
            .then(res => res.json())
            .then(data => {
                if(data.status === "BERJAYA") {
                    paparkanJadual(data.data);
                } else {
                    tbody.innerHTML = `<tr><td colspan="5" class="p-6 text-center text-red-600 font-bold">Ralat: ${data.mesej}</td></tr>`;
                }
            })
            .catch(err => {
                tbody.innerHTML = `<tr><td colspan="5" class="p-6 text-center text-red-600 font-bold">⚠️ Gagal menghubungi server.</td></tr>`;
            });
        }

        function paparkanJadual(senarai) {
            const tbody = document.getElementById('isiJadual');
            tbody.innerHTML = "";

            if (senarai.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-gray-500 font-medium">✨ Tiada permohonan baru. Semua pengguna telah disahkan.</td></tr>`;
                return;
            }

            senarai.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "border-b hover:bg-blue-50 transition";
                tr.innerHTML = `
                    <td class="p-4 font-mono font-bold text-gray-700">${row.ic}</td>
                    <td class="p-4 font-semibold text-gray-800">${row.nama}</td>
                    <td class="p-4 font-bold text-blue-700">${row.jabatan}</td>
                    <td class="p-4"><span class="bg-gray-200 text-gray-700 px-2 py-1 rounded text-xs font-bold">${row.peranan}</span></td>
                    <td class="p-4 text-center">
                        <button onclick="prosesPengesahan('${row.ic}', 'sahkanPengguna')" class="bg-green-500 hover:bg-green-600 text-white px-3 py-1.5 rounded font-semibold text-sm mr-2 transition">Sahkan</button>
                        <button onclick="prosesPengesahan('${row.ic}', 'tolakPengguna')" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded font-semibold text-sm transition">Tolak</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function prosesPengesahan(ic, actionType) {
            if(!confirm(actionType === 'sahkanPengguna' ? "Adakah anda pasti mahu LULUSKAN pengguna ini?" : "Adakah anda pasti mahu TOLAK dan PADAM pendaftaran ini?")) return;

            const statusMesej = document.getElementById('statusMesej');
            statusMesej.className = 'mb-4 p-4 rounded text-center text-sm font-semibold bg-blue-100 text-blue-800 border border-blue-200';
            statusMesej.innerText = "⏳ Sedang memproses kelulusan...";
            statusMesej.classList.remove('hidden');

            fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: actionType, NO_IC: ic })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "BERJAYA") {
                    statusMesej.className = 'mb-4 p-4 rounded text-center text-sm font-semibold bg-green-100 text-green-800 border border-green-200';
                    statusMesej.innerText = "✅ " + data.mesej;
                    ambilDataPending(); // Refresh jadual
                } else {
                    statusMesej.className = 'mb-4 p-4 rounded text-center text-sm font-semibold bg-red-100 text-red-800 border border-red-200';
                    statusMesej.innerText = "❌ Ralat: " + data.mesej;
                }
                setTimeout(() => statusMesej.classList.add('hidden'), 4000);
            })
            .catch(err => {
                statusMesej.className = 'mb-4 p-4 rounded text-center text-sm font-semibold bg-red-100 text-red-800 border border-red-200';
                statusMesej.innerText = "⚠️ Ralat Server/URL.";
            });
        }

        window.onload = ambilDataPending;
    </script>
</body>
</html>

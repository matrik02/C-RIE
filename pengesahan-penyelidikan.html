<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengesahan KPI Penyelidikan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Semak log masuk dan pastikan hanya Admin/Pengesah yang boleh akses (Pilihan)
        if (sessionStorage.getItem("userLulus") !== "YA") {
            alert("Akses ditolak! Sila log masuk terlebih dahulu.");
            window.location.href = "login.html"; 
        }
    </script>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans text-gray-800">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-white p-5 rounded-xl shadow-sm border border-gray-200 gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-gray-800">🛡️ Pengesahan KPI Penyelidikan</h1>
                <p class="text-sm text-gray-500 mt-1">Senarai penyelidikan yang menunggu semakan dan kelulusan.</p>
            </div>
            <div>
                <a href="dashboard-penyelidikan.html" class="bg-slate-600 hover:bg-slate-700 text-white px-5 py-2.5 rounded-lg font-semibold transition shadow-md flex items-center gap-2 text-sm">
                    &larr; Kembali Dashboard
                </a>
            </div>
        </div>

        <div id="statusMesej" class="hidden mb-6 p-4 rounded-lg text-center text-sm font-semibold shadow-sm"></div>

        <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto p-4 md:p-6">
                <table class="w-full text-left border-collapse whitespace-nowrap">
                    <thead>
                        <tr class="bg-gray-100 text-gray-700 text-sm border-b-2 border-gray-200">
                            <th class="py-3 px-4 font-bold">Bil</th>
                            <th class="py-3 px-4 font-bold">Maklumat Penyelidikan</th>
                            <th class="py-3 px-4 font-bold">Penulis & Jabatan</th>
                            <th class="py-3 px-4 font-bold">Dokumen Bukti</th>
                            <th class="py-3 px-4 font-bold text-center">Tindakan</th>
                        </tr>
                    </thead>
                    <tbody id="senaraiMenunggu" class="text-sm divide-y divide-gray-100">
                        <tr>
                            <td colspan="5" class="py-8 text-center text-gray-500 font-medium">⏳ Sedang memuatkan senarai untuk disahkan...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ MASUKKAN URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxh9pAf8LKl5CU7HFcr5TfKZYy1O5XeFhAX9GgiojzCvB81IOfnNBOuzQoV7zntObI/exec"; 

        window.onload = muatSenaraiMenunggu;

        function muatSenaraiMenunggu() {
            const tbody = document.getElementById("senaraiMenunggu");
            const fetchUrl = SCRIPT_URL.includes('?') ? `${SCRIPT_URL}&action=ambilKPIPenyelidikan` : `${SCRIPT_URL}?action=ambilKPIPenyelidikan`;

            fetch(fetchUrl)
                .then(res => res.json())
                .then(data => {
                    if (data.status === "BERJAYA") {
                        const senaraiMenunggu = data.data.filter(item => item.statusPengesahan.toUpperCase() === "MENUNGGU");

                        if (senaraiMenunggu.length === 0) {
                            tbody.innerHTML = `<tr><td colspan="5" class="py-8 text-center text-gray-500 font-medium">🎉 Tiada rekod baharu yang menunggu pengesahan. Semua selesai!</td></tr>`;
                            return;
                        }

                        tbody.innerHTML = ""; 
                        
                        senaraiMenunggu.forEach((item) => {
                            let butangURL = item.urlBukti 
                                ? `<a href="${item.urlBukti}" target="_blank" class="text-blue-600 hover:text-blue-800 underline font-semibold flex items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg> Buka Pautan</a>` 
                                : `<span class="text-gray-400 italic">Tiada Pautan</span>`;

                            let baris = `
                                <tr class="hover:bg-gray-50 transition" id="baris-${item.bil}">
                                    <td class="py-4 px-4 font-bold text-gray-600">RND-${item.bil}</td>
                                    <td class="py-4 px-4 whitespace-normal min-w-[250px]">
                                        <p class="font-bold text-gray-800 text-wrap leading-tight mb-1">${item.tajuk}</p>
                                        <span class="inline-block bg-purple-100 text-purple-800 text-xs px-2 py-0.5 rounded border border-purple-200">${item.indexStatus}</span>
                                        <span class="inline-block bg-gray-100 text-gray-600 text-xs px-2 py-0.5 rounded border border-gray-200 ml-1">${item.tarikhTerbit}</span>
                                    </td>
                                    <td class="py-4 px-4 whitespace-normal">
                                        <p class="font-semibold text-gray-700">${item.penulis}</p>
                                        <p class="text-xs text-gray-500 mt-0.5">${item.jabatan}</p>
                                    </td>
                                    <td class="py-4 px-4">${butangURL}</td>
                                    <td class="py-4 px-4 text-center">
                                        <div class="flex justify-center gap-2 flex-wrap">
                                            <button onclick="kemaskiniStatus('${item.bil}', 'DISAHKAN')" class="bg-green-100 hover:bg-green-600 text-green-700 hover:text-white border border-green-300 px-3 py-1.5 rounded-md font-bold text-xs transition flex items-center gap-1 shadow-sm">
                                                ✔️ Sahkan
                                            </button>
                                            <button onclick="kemaskiniStatus('${item.bil}', 'DITOLAK')" class="bg-yellow-100 hover:bg-yellow-600 text-yellow-700 hover:text-white border border-yellow-300 px-3 py-1.5 rounded-md font-bold text-xs transition flex items-center gap-1 shadow-sm">
                                                ❌ Tolak
                                            </button>
                                            <button onclick="padamRekod('${item.bil}')" class="bg-gray-100 hover:bg-gray-800 text-gray-700 hover:text-white border border-gray-300 px-3 py-1.5 rounded-md font-bold text-xs transition flex items-center gap-1 shadow-sm">
                                                🗑️ Padam
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            `;
                            tbody.innerHTML += baris;
                        });
                    } else {
                        tbody.innerHTML = `<tr><td colspan="5" class="py-8 text-center text-red-500 font-bold">❌ Gagal memuatkan data. Sila semak sambungan anda.</td></tr>`;
                    }
                })
                .catch(err => {
                    console.error("Ralat:", err);
                    tbody.innerHTML = `<tr><td colspan="5" class="py-8 text-center text-red-500 font-bold">⚠️ Ralat sistem. Sila hubungi pembangun.</td></tr>`;
                });
        }

        // Fungsi kemaskini (SAHKAN / TOLAK)
        function kemaskiniStatus(bil, statusBaru) {
            const mesejPengesahan = statusBaru === "DISAHKAN" 
                ? "Adakah anda pasti untuk SAHKAN rekod penyelidikan ini?" 
                : "Adakah anda pasti mahu TOLAK rekod ini? Data tidak akan dipaparkan di Sijil.";
            
            if (!confirm(mesejPengesahan)) return;

            laksanakanArahanAPI("kemaskiniStatusPenyelidikan", bil, statusBaru);
        }

        // Fungsi PADAM rekod terus
        function padamRekod(bil) {
            const mesejPengesahan = "⚠️ AMARAN: Adakah anda pasti mahu MEMADAM rekod ini sepenuhnya dari pangkalan data? Tindakan ini tidak boleh dipulihkan.";
            
            if (!confirm(mesejPengesahan)) return;

            laksanakanArahanAPI("padamKPIPenyelidikan", bil, null);
        }

        // Fungsi berpusat untuk panggil API bagi mengelakkan kod berulang
        function laksanakanArahanAPI(actionType, bil, statusBaru) {
            const statusMesej = document.getElementById("statusMesej");
            const barisElement = document.getElementById(`baris-${bil}`);
            
            if(barisElement) barisElement.classList.add("opacity-50", "pointer-events-none");

            statusMesej.className = "mb-6 p-4 rounded-lg text-center text-sm font-bold bg-blue-100 text-blue-800 border border-blue-200 block";
            statusMesej.innerText = actionType === "padamKPIPenyelidikan" 
                ? `⏳ Sedang memadam rekod RND-${bil}...` 
                : `⏳ Sedang mengemaskini status rekod RND-${bil}...`;

            const payload = {
                action: actionType,
                bil: bil,
                statusBaru: statusBaru
            };

            fetch(SCRIPT_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "BERJAYA") {
                    statusMesej.className = "mb-6 p-4 rounded-lg text-center text-sm font-bold bg-green-100 text-green-800 border border-green-200 block";
                    statusMesej.innerText = actionType === "padamKPIPenyelidikan"
                        ? `✅ Rekod RND-${bil} berjaya dipadam sepenuhnya.`
                        : `✅ Rekod RND-${bil} berjaya dikemaskini sebagai ${statusBaru}.`;
                    
                    if(barisElement) barisElement.classList.add("hidden");
                    
                    const senaraiTinggal = document.querySelectorAll("tbody#senaraiMenunggu tr:not(.hidden)").length;
                    if(senaraiTinggal === 0) {
                        document.getElementById("senaraiMenunggu").innerHTML = `<tr><td colspan="5" class="py-8 text-center text-gray-500 font-medium">🎉 Tiada rekod baharu yang menunggu pengesahan. Semua selesai!</td></tr>`;
                    }
                } else {
                    if(barisElement) barisElement.classList.remove("opacity-50", "pointer-events-none");
                    statusMesej.className = "mb-6 p-4 rounded-lg text-center text-sm font-bold bg-red-100 text-red-800 border border-red-200 block";
                    statusMesej.innerText = "❌ Gagal: " + data.mesej;
                }
            })
            .catch(error => {
                if(barisElement) barisElement.classList.remove("opacity-50", "pointer-events-none");
                statusMesej.className = "mb-6 p-4 rounded-lg text-center text-sm font-bold bg-red-100 text-red-800 border border-red-200 block";
                statusMesej.innerText = "⚠️ Ralat rangkaian. Sila cuba lagi.";
            });
        }
    </script>
</body>
</html>

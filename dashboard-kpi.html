<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard KPI Produk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        if (sessionStorage.getItem("userLulus") !== "YA") {
            alert("Akses ditolak! Sila log masuk terlebih dahulu.");
            window.location.href = "login.html"; 
        }
    </script>
</head>
<body class="bg-gray-100 p-6 font-sans text-gray-800">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm border border-gray-200 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">📈 Dashboard KPI Produk</h1>
                <p class="text-sm text-gray-500 mt-1">Selamat datang, <span id="namaPengguna" class="font-bold text-blue-600">...</span> 
                (<span id="perananPengguna" class="uppercase"></span> - <span id="jabatanPengguna" class="uppercase font-bold"></span>)</p>
            </div>
            <div class="flex flex-wrap gap-2 items-center">
                
                <div id="divFilterJabatan" class="hidden items-center bg-gray-50 border rounded-lg px-3">
                    <label class="text-xs font-bold text-gray-500 mr-2 uppercase">Jabatan:</label>
                    <select id="filterJabatan" onchange="tapisData()" class="bg-transparent py-2 focus:outline-none font-semibold text-blue-700">
                        <option value="Semua">Semua</option>
                    </select>
                </div>

                <div class="flex items-center bg-gray-50 border rounded-lg px-3">
                    <label class="text-xs font-bold text-gray-500 mr-2 uppercase">Tahun:</label>
                    <select id="filterTahun" onchange="tapisData()" class="bg-transparent py-2 focus:outline-none font-semibold text-blue-700">
                        <option value="Semua">Semua</option>
                    </select>
                </div>

                <a href="utama.html" class="bg-slate-600 hover:bg-slate-700 text-white px-4 py-2.5 rounded-lg font-semibold transition shadow-md flex items-center gap-1">🏠 Utama</a>
                <a href="dashboard.html" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-lg font-semibold transition shadow-md flex items-center gap-1">📊 Inovasi</a>
                <a href="pengesahan-kpi.html" id="btnPengesahanKPI" class="hidden bg-purple-600 hover:bg-purple-700 text-white px-4 py-2.5 rounded-lg font-semibold transition shadow-md items-center gap-1">🔐 Sahkan KPI</a>
                <a href="tambah-kpi.html" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2.5 rounded-lg font-semibold transition shadow-md flex items-center gap-1">➕ Tambah</a>
                <a href="senarai-sijil.html" class="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2.5 rounded-lg font-semibold transition shadow-md flex items-center gap-1">📥 Download Sijil</a>
                <button onclick="muatTurunCSV()" class="bg-teal-600 hover:bg-teal-700 text-white px-4 py-2.5 rounded-lg font-semibold transition shadow-md flex items-center gap-1">📥 CSV</button>
                <button onclick="logKeluar()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2.5 rounded-lg font-semibold transition shadow-md">Log Keluar</button>
            </div>
        </div>

        <div id="bahagianCarta" class="hidden mb-8">
            <div class="bg-white p-6 rounded-xl shadow-md border border-gray-100 h-80 w-full lg:w-2/3 mx-auto">
                <h2 class="text-xl font-bold text-gray-800 mb-4 text-center">Rekod KPI mengikut Jabatan</h2>
                <canvas id="jabatanChart"></canvas>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center bg-gray-50">
                <h2 class="text-xl font-bold text-gray-800">📋 Senarai KPI <span id="tajukJadual" class="text-blue-600"></span></h2>
                <button onclick="ambilData()" class="text-blue-600 hover:underline text-sm font-semibold">🔄 Refresh Data</button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[1100px]">
                    <thead>
                        <tr class="bg-blue-600 text-white text-xs uppercase">
                            <th class="p-4 border-b">BIL</th>
                            <th class="p-4 border-b w-1/4">NAMA PRODUK</th>
                            <th class="p-4 border-b">KETUA</th>
                            <th class="p-4 border-b">AHLI</th>
                            <th class="p-4 border-b">JABATAN</th>
                            <th class="p-4 border-b">APLIKASI</th>
                            <th class="p-4 border-b">JENIS</th>
                            <th class="p-4 border-b">NO DAFTAR</th>
                            <th class="p-4 border-b">TAHUN</th>
                            <th class="p-4 border-b text-center">STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="isiJadual" class="text-gray-700 text-sm bg-white">
                        <tr><td colspan="10" class="p-10 text-center font-semibold text-gray-500 animate-pulse">⏳ Sedang memuatkan data KPI...</td></tr>
                    </tbody>
                </table>
            </div>

            <div id="paginationControls" class="p-4 border-t bg-gray-50 flex justify-between items-center text-sm text-gray-700"></div>
        </div>
    </div>

    <script>
        // ⚠️ MASUKKAN URL WEB APP ANDA DI SINI
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxh9pAf8LKl5CU7HFcr5TfKZYy1O5XeFhAX9GgiojzCvB81IOfnNBOuzQoV7zntObI/exec'; 
        
        let semuaData = []; 
        let currentFilteredData = []; 
        let currentPage = 1;
        const rowsPerPage = 10;
        let jabatanChartInstance = null;

        const userNama = sessionStorage.getItem("namaPengguna") || "Pengguna";
        const userPeranan = sessionStorage.getItem("peranan") || "STAF";
        const userJabatan = sessionStorage.getItem("jabatan") || "";

        document.getElementById('namaPengguna').innerText = userNama;
        document.getElementById('perananPengguna').innerText = userPeranan;
        document.getElementById('jabatanPengguna').innerText = userJabatan;
        
        if (userPeranan.toUpperCase().includes("INOVASI") || userPeranan.toUpperCase() === "ADMIN") {
            const btnPengesahanKPI = document.getElementById('btnPengesahanKPI');
            if (btnPengesahanKPI) {
                btnPengesahanKPI.classList.remove('hidden');
                btnPengesahanKPI.classList.add('flex');
            }
        }

        if(userPeranan.toUpperCase() === "STAF" && userJabatan) {
            document.getElementById('tajukJadual').innerText = `(${userJabatan})`;
        } else {
            document.getElementById('tajukJadual').innerText = `(Semua Jabatan)`;
            document.getElementById('divFilterJabatan').classList.remove('hidden');
            document.getElementById('divFilterJabatan').classList.add('flex');
        }

        async function ambilData() {
            const tbody = document.getElementById('isiJadual');
            const paginationControls = document.getElementById('paginationControls');
            
            tbody.innerHTML = `<tr><td colspan="10" class="p-10 text-center font-semibold text-blue-500">⏳ Sedang menarik data KPI...</td></tr>`;
            paginationControls.innerHTML = '';

            try {
                const fetchUrl = scriptURL.includes('?') ? `${scriptURL}&action=ambilKPI` : `${scriptURL}?action=ambilKPI`;
                const response = await fetch(fetchUrl);
                
                if (!response.ok) throw new Error("Akses ditolak (CORS) atau URL salah.");
                const rawText = await response.text(); 
                let result = JSON.parse(rawText);

                let dataDariSheet = result.status === "BERJAYA" ? result.data || [] : [];

                if (dataDariSheet.length > 0) {
                    if (userPeranan.toUpperCase() === "STAF" && userJabatan !== "") {
                        // Jabatan kini di indeks 6
                        dataDariSheet = dataDariSheet.filter(row => String(row[6] || "").trim().toUpperCase() === userJabatan.toUpperCase());
                    }

                    if (dataDariSheet.length > 0) {
                        semuaData = dataDariSheet;
                        document.getElementById('bahagianCarta').classList.remove('hidden');
                        binaFilter(semuaData);
                        tapisData();
                    } else {
                        tbody.innerHTML = `<tr><td colspan="10" class="p-6 text-center text-orange-600 font-bold">⚠️ Tiada rekod KPI dijumpai untuk jabatan anda.</td></tr>`;
                        document.getElementById('bahagianCarta').classList.add('hidden');
                    }
                } else {
                    tbody.innerHTML = `<tr><td colspan="10" class="p-6 text-center text-orange-600 font-bold">⚠️ Data KPI Kosong.</td></tr>`;
                    document.getElementById('bahagianCarta').classList.add('hidden');
                }

            } catch (error) {
                console.error(error);
                tbody.innerHTML = `<tr><td colspan="10" class="p-8 text-center text-red-600 leading-relaxed">⚠️ Ralat Rangkaian / Web App<br><span class="text-xs">${error.message}</span></td></tr>`;
            }
        }

        function binaFilter(data) {
            const dropTahun = document.getElementById('filterTahun');
            // TAHUN kini di indeks 10
            const tahunUnik = [...new Set(data.map(r => r[10]).filter(t => t !== "" && t != null))].sort((a, b) => b - a); 
            const pilTahunAsal = dropTahun.value;
            dropTahun.innerHTML = '<option value="Semua">Semua</option>';
            tahunUnik.forEach(thn => { dropTahun.innerHTML += `<option value="${thn}">${thn}</option>`; });
            if (tahunUnik.includes(Number(pilTahunAsal)) || pilTahunAsal === "Semua") dropTahun.value = pilTahunAsal;

            if (userPeranan.toUpperCase() !== "STAF") {
                const dropJabatan = document.getElementById('filterJabatan');
                // JABATAN kini di indeks 6
                const jabatanUnik = [...new Set(data.map(r => String(r[6]).trim()).filter(j => j !== "" && j !== "-"))].sort(); 
                const pilJabatanAsal = dropJabatan.value;
                dropJabatan.innerHTML = '<option value="Semua">Semua</option>';
                jabatanUnik.forEach(jab => { dropJabatan.innerHTML += `<option value="${jab}">${jab}</option>`; });
                if (jabatanUnik.includes(pilJabatanAsal) || pilJabatanAsal === "Semua") dropJabatan.value = pilJabatanAsal;
            }
        }

        function tapisData() {
            const tahunDipilih = document.getElementById('filterTahun').value;
            const jabatanDipilih = document.getElementById('filterJabatan') ? document.getElementById('filterJabatan').value : "Semua";
            
            let dataDitapis = semuaData;

            if (tahunDipilih !== "Semua") dataDitapis = dataDitapis.filter(r => String(r[10]) === String(tahunDipilih)); 
            if (jabatanDipilih !== "Semua" && userPeranan.toUpperCase() !== "STAF") {
                dataDitapis = dataDitapis.filter(r => String(r[6]).trim().toUpperCase() === jabatanDipilih.toUpperCase()); 
            }

            currentFilteredData = dataDitapis; 
            currentPage = 1; 

            drawTable();
            kemaskiniCarta(dataDitapis);
        }

        function drawTable() {
            const tbody = document.getElementById('isiJadual');
            const paginationControls = document.getElementById('paginationControls');
            tbody.innerHTML = "";

            if (currentFilteredData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="10" class="p-10 text-center text-gray-500 font-medium">Kosong. Tiada rekod KPI dijumpai.</td></tr>`;
                paginationControls.innerHTML = '';
                return;
            }

            const startIndex = (currentPage - 1) * rowsPerPage;
            const endIndex = startIndex + rowsPerPage;
            const dataPaginasi = currentFilteredData.slice(startIndex, endIndex);

            dataPaginasi.forEach((row, index) => {
                const rowNum = row[0] || (startIndex + index + 1);
                
                // STATUS kini di indeks 12
                const statusVal = String(row[12] || 'DISAHKAN').trim().toUpperCase();
                const statusBadge = (statusVal === 'MENUNGGU PENGESAHAN') 
                    ? `<span class="bg-yellow-100 text-yellow-800 border border-yellow-300 px-2 py-1 rounded text-[10px] font-bold whitespace-nowrap">MENUNGGU</span>` 
                    : `<span class="bg-green-100 text-green-800 border border-green-300 px-2 py-1 rounded text-[10px] font-bold whitespace-nowrap">DISAHKAN</span>`;

                const tr = document.createElement('tr');
                tr.className = "border-b hover:bg-blue-50 transition text-sm";
                tr.innerHTML = `
                    <td class="p-4 font-bold text-gray-600">${rowNum}</td>
                    <td class="p-4 font-semibold text-gray-800">${row[1] || '-'}</td>
                    <td class="p-4 font-medium text-gray-700">${row[2] || '-'}</td>
                    <td class="p-4 text-gray-500 text-xs">${row[5] || '-'}</td> <td class="p-4 font-bold text-blue-700">${row[6] || '-'}</td> <td class="p-4">${row[7] || '-'}</td> <td class="p-4"><span class="px-2 py-1 rounded-full text-[10px] font-bold uppercase bg-purple-100 text-purple-800 border border-purple-200">${row[8] || '-'}</span></td> <td class="p-4 font-mono">${row[9] || '-'}</td> <td class="p-4 font-mono font-bold">${row[10] || '-'}</td> <td class="p-4 text-center">${statusBadge}</td>
                `;
                tbody.appendChild(tr);
            });

            paparPagination(currentFilteredData.length);
        }

        function kemaskiniCarta(data) {
            const rekodJabatan = {};
            data.forEach(r => { let j = r[6] || "N/A"; rekodJabatan[j] = (rekodJabatan[j] || 0) + 1; }); // JABATAN: 6

            const warnaBar = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#14b8a6', '#f97316', '#6366f1', '#84cc16'];

            if (jabatanChartInstance) jabatanChartInstance.destroy();
            jabatanChartInstance = new Chart(document.getElementById('jabatanChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(rekodJabatan),
                    datasets: [{ 
                        label: 'Bilangan KPI', data: Object.values(rekodJabatan), 
                        backgroundColor: warnaBar, borderRadius: 4 
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function paparPagination(totalRows) {
            const paginationControls = document.getElementById('paginationControls');
            const totalPages = Math.ceil(totalRows / rowsPerPage);
            const rekodMula = ((currentPage - 1) * rowsPerPage) + 1;
            const rekodTamat = Math.min(currentPage * rowsPerPage, totalRows);
            
            paginationControls.innerHTML = `
                <span class="font-semibold text-gray-500">Papar <span class="text-blue-600">${rekodMula}</span> hingga <span class="text-blue-600">${rekodTamat}</span> dari <span class="text-gray-800">${totalRows}</span> rekod</span>
                <div class="flex gap-2">
                    <button onclick="tukarHalaman(-1)" class="px-4 py-1.5 bg-white border border-gray-300 hover:bg-gray-100 rounded shadow-sm font-bold text-gray-600 transition ${currentPage === 1 ? 'opacity-50 cursor-not-allowed' : ''}" ${currentPage === 1 ? 'disabled' : ''}>⬅️ Sblm</button>
                    <span class="px-4 py-1.5 font-bold bg-blue-50 border border-blue-200 rounded text-blue-700 shadow-inner">${currentPage} / ${totalPages}</span>
                    <button onclick="tukarHalaman(1)" class="px-4 py-1.5 bg-white border border-gray-300 hover:bg-gray-100 rounded shadow-sm font-bold text-gray-600 transition ${currentPage === totalPages ? 'opacity-50 cursor-not-allowed' : ''}" ${currentPage === totalPages ? 'disabled' : ''}>Set ➡️</button>
                </div>
            `;
        }

        function tukarHalaman(arah) { currentPage += arah; drawTable(); }

        function muatTurunCSV() {
            if (currentFilteredData.length === 0) return alert("Tiada data untuk dimuat turun.");
            const headers = ["BIL", "NAMA PRODUK", "KETUA", "NO TELEFON", "EMEL", "AHLI", "JABATAN", "APLIKASI", "JENIS", "NO DAFTAR", "TAHUN", "STATUS"];
            let csvContent = headers.join(',') + "\n";
            currentFilteredData.forEach((row, index) => {
                let rowData = [row[0] || (index + 1), row[1], row[2], row[3], row[4], row[5], row[6], row[7], row[8], row[9], row[10], row[12] || "DISAHKAN"];
                let baris = rowData.map(cell => { let teks = String(cell || "").replace(/"/g, '""'); return `"${teks}"`; });
                csvContent += baris.join(",") + "\n";
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `Data_KPI_Eksport_${document.getElementById('filterTahun').value}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function logKeluar() { sessionStorage.clear(); window.location.href = "login.html"; }

        window.onload = ambilData;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senarai Pertandingan Inovasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 md:p-6 font-sans text-gray-800">

    <div class="max-w-7xl mx-auto">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm border border-gray-200 gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-pink-700">🏆 Senarai Pertandingan</h1>
                <p class="text-sm text-gray-500 mt-1">Maklumat senarai pertandingan inovasi terkini</p>
            </div>
            <div>
                <a href="utama.html" class="bg-gray-600 hover:bg-gray-700 text-white px-5 py-2.5 rounded-lg font-semibold transition shadow-md flex items-center gap-2">
                    &larr; Kembali ke Utama
                </a>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
            <div class="p-4 md:p-6 border-b flex justify-between items-center bg-pink-50">
                <h2 class="text-lg font-bold text-gray-800">📋 Jadual Pertandingan</h2>
                <button onclick="ambilDataPertandingan()" class="text-pink-600 hover:underline text-sm font-semibold">🔄 Refresh</button>
            </div>
            
            <div class="md:hidden text-xs text-pink-600 font-semibold p-2 bg-pink-50 flex items-center justify-center gap-1 animate-pulse border-b">
                <span>👉</span> Sila geser jadual ke kiri/kanan untuk lihat penuh
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[800px]">
                    <thead>
                        <tr id="tajukJadual" class="bg-pink-600 text-white text-xs uppercase">
                            <th class="p-4 border-b text-center">Sila Tunggu...</th>
                        </tr>
                    </thead>
                    <tbody id="isiJadual" class="text-gray-700 text-sm bg-white">
                        <tr><td class="p-10 text-center font-semibold text-gray-500 animate-pulse">⏳ Sedang memuatkan senarai pertandingan...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // ⚠️ MASUKKAN URL WEB APP ANDA DI BAWAH INI
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxh9pAf8LKl5CU7HFcr5TfKZYy1O5XeFhAX9GgiojzCvB81IOfnNBOuzQoV7zntObI/exec';

        async function ambilDataPertandingan() {
            const tbody = document.getElementById('isiJadual');
            const thead = document.getElementById('tajukJadual');
            
            tbody.innerHTML = `<tr><td class="p-10 text-center font-semibold text-pink-500">⏳ Sedang menarik maklumat pangkalan data...</td></tr>`;

            try {
                const fetchUrl = SCRIPT_URL.includes('?') ? `${SCRIPT_URL}&action=ambilSenaraiPertandingan` : `${SCRIPT_URL}?action=ambilSenaraiPertandingan`;
                const response = await fetch(fetchUrl);
                
                if (!response.ok) throw new Error("Gagal berhubung dengan pelayan.");
                
                const result = await response.json();

                if (result.status === "BERJAYA") {
                    // Bina Tajuk Lajur Secara Automatik dari Spreadsheet
                    const headers = result.headers || [];
                    thead.innerHTML = "";
                    if(headers.length > 0) {
                        headers.forEach(headText => {
                            thead.innerHTML += `<th class="p-4 border-b">${headText}</th>`;
                        });
                    } else {
                        thead.innerHTML = `<th class="p-4 border-b">TIADA LAJUR JADUAL DITEMUI</th>`;
                    }

                    // Bina Baris Data
                    const data = result.data || [];
                    tbody.innerHTML = "";

                    if (data.length > 0) {
                        data.forEach(row => {
                            const tr = document.createElement('tr');
                            tr.className = "border-b hover:bg-pink-50 transition";
                            
                            // Masukkan setiap sel mengikut bilangan lajur
                            row.forEach(cell => {
                                tr.innerHTML += `<td class="p-4">${cell || '-'}</td>`;
                            });
                            
                            tbody.appendChild(tr);
                        });
                    } else {
                        tbody.innerHTML = `<tr><td colspan="${headers.length || 1}" class="p-6 text-center text-orange-600 font-bold">⚠️ Tiada rekod pertandingan dijumpai dalam sistem.</td></tr>`;
                    }

                } else {
                    tbody.innerHTML = `<tr><td class="p-6 text-center text-red-600 font-bold">❌ Mesej Sistem: ${result.mesej}</td></tr>`;
                }

            } catch (error) {
                console.error(error);
                tbody.innerHTML = `<tr><td class="p-8 text-center text-red-600 leading-relaxed">⚠️ Ralat Rangkaian / Web App<br><span class="text-xs">${error.message}</span></td></tr>`;
            }
        }

        // Jalankan fungsi bila laman web dibuka
        window.onload = ambilDataPertandingan;
    </script>
</body>
</html>

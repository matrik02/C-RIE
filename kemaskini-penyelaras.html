<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengurusan Penyelaras & Pengguna</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        // KAWALAN AKSES KETAT KHAS UNTUK PENGURUSAN SAHAJA
        const userLulus = sessionStorage.getItem("userLulus") || "";
        const userPeranan = sessionStorage.getItem("peranan") || "";

        if (userLulus !== "YA") {
            alert("Sila log masuk terlebih dahulu.");
            window.location.href = "login.html"; 
        } else if (
            userPeranan.toUpperCase() !== "PENYELARAS INOVASI" && 
            userPeranan.toUpperCase() !== "PENYELARAS PENYELIDIKAN" && 
            userPeranan.toUpperCase() !== "ADMIN"
        ) {
            alert("🛑 Akses Ditolak! Modul ini hanya untuk Penyelaras Inovasi atau Penyelidikan sahaja.");
            window.location.href = "utama.html"; 
        }
    </script>
</head>
<body class="bg-slate-100 p-4 md:p-6 font-sans text-gray-800 min-h-screen">

    <div class="max-w-7xl mx-auto">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm border border-gray-200 gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-indigo-700">👥 Pengurusan Penyelaras</h1>
                <p class="text-sm text-gray-500 mt-1">Daftar, Kemaskini, Padam & Reset Kata Laluan Pengguna.</p>
            </div>
            <div class="flex gap-2 items-center">
                <button onclick="bukaModalDaftar()" class="bg-green-600 hover:bg-green-700 text-white px-5 py-2.5 rounded-lg font-bold transition shadow-md flex items-center gap-2">
                    ➕ Daftar Baru
                </button>
                <a href="pengurusan-data.html" class="bg-slate-600 hover:bg-slate-700 text-white px-5 py-2.5 rounded-lg font-bold transition shadow-md flex items-center gap-2">
                    &larr; Kembali
                </a>
            </div>
        </div>

        <div id="statusMesejUtama" class="hidden mb-4 p-4 rounded-lg text-center text-sm font-bold shadow-sm"></div>

        <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
            <div class="p-4 border-b flex justify-between items-center bg-indigo-50">
                <h2 class="text-lg font-bold text-gray-800">Senarai Pengguna / Penyelaras</h2>
                <button onclick="muatDataPengguna()" class="text-indigo-600 hover:underline text-sm font-bold">🔄 Refresh</button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[1200px]">
                    <thead>
                        <tr class="bg-indigo-600 text-white text-xs uppercase tracking-wide">
                            <th class="p-4 border-b">NO. KAD PENGENALAN</th>
                            <th class="p-4 border-b w-1/4">NAMA PENUH</th>
                            <th class="p-4 border-b">KATA LALUAN</th>
                            <th class="p-4 border-b">JABATAN</th>
                            <th class="p-4 border-b">PERANAN</th>
                            <th class="p-4 border-b text-center">STATUS</th>
                            <th class="p-4 border-b text-center w-64">TINDAKAN</th>
                        </tr>
                    </thead>
                    <tbody id="isiJadual" class="text-gray-700 text-sm bg-white">
                        <tr><td colspan="7" class="p-10 text-center font-bold text-gray-500 animate-pulse">⏳ Memuatkan data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <div id="modalKemaskini" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl shadow-2xl max-w-lg w-full overflow-hidden">
            <div class="bg-indigo-600 p-4 text-white flex justify-between items-center">
                <h3 class="font-bold text-lg">✏️ Kemaskini Pengguna</h3>
                <button onclick="tutupModal('modalKemaskini')" class="font-bold text-xl hover:text-gray-200">&times;</button>
            </div>
            <form id="borangKemaskini" class="p-6 space-y-4">
                <input type="hidden" id="edit_ic"> <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">NO. KAD PENGENALAN</label>
                    <input type="text" id="papar_edit_ic" disabled class="w-full px-3 py-2 border rounded bg-gray-100 font-bold text-gray-600">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">NAMA PENUH</label>
                    <input type="text" id="edit_nama" required class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none uppercase">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">JABATAN</label>
                        <select id="edit_jabatan" required class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none uppercase">
                            <option value="JTMK">JTMK</option><option value="JKE">JKE</option><option value="JKA">JKA</option><option value="JKM">JKM</option><option value="JP">JP</option><option value="JPA">JPA</option><option value="JMSK">JMSK</option><option value="C-RIE">C-RIE</option><option value="PENGURUSAN">PENGURUSAN</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">PERANAN</label>
                        <select id="edit_peranan" required class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none uppercase">
                            <option value="STAF">STAF</option>
                            <option value="PENYELARAS JABATAN">PENYELARAS JABATAN</option>
                            <option value="PENYELARAS INOVASI">PENYELARAS INOVASI</option>
                            <option value="PENYELARAS PENYELIDIKAN">PENYELARAS PENYELIDIKAN</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">STATUS</label>
                    <select id="edit_status" required class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none font-bold">
                        <option value="AKTIF">AKTIF</option>
                        <option value="MENUNGGU PENGESAHAN">MENUNGGU PENGESAHAN</option>
                    </select>
                </div>
                <div class="pt-4 flex justify-end gap-2 border-t">
                    <button type="button" onclick="tutupModal('modalKemaskini')" class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-4 py-2 rounded font-bold">Batal</button>
                    <button type="submit" id="btnSimpanKemaskini" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded font-bold">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modalDaftar" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl shadow-2xl max-w-lg w-full overflow-hidden">
            <div class="bg-green-600 p-4 text-white flex justify-between items-center">
                <h3 class="font-bold text-lg">➕ Daftar Penyelaras Baru</h3>
                <button onclick="tutupModal('modalDaftar')" class="font-bold text-xl hover:text-gray-200">&times;</button>
            </div>
            <form id="borangDaftar" class="p-6 space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">NO. KAD PENGENALAN</label>
                    <input type="text" id="daftar_ic" required class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">NAMA PENUH</label>
                    <input type="text" id="daftar_nama" required class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-green-500 outline-none uppercase">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">KATA LALUAN</label>
                    <input type="text" id="daftar_pass" required class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">JABATAN</label>
                        <select id="daftar_jabatan" required class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-green-500 outline-none uppercase">
                            <option value="JTMK">JTMK</option><option value="JKE">JKE</option><option value="JKA">JKA</option><option value="JKM">JKM</option><option value="JP">JP</option><option value="JPA">JPA</option><option value="JMSK">JMSK</option><option value="C-RIE">C-RIE</option><option value="PENGURUSAN">PENGURUSAN</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">PERANAN</label>
                        <select id="daftar_peranan" required class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-green-500 outline-none uppercase">
                            <option value="PENYELARAS JABATAN">PENYELARAS JABATAN</option>
                            <option value="PENYELARAS INOVASI">PENYELARAS INOVASI</option>
                            <option value="PENYELARAS PENYELIDIKAN">PENYELARAS PENYELIDIKAN</option>
                            <option value="STAF">STAF</option>
                        </select>
                    </div>
                </div>
                <div class="pt-4 flex justify-end gap-2 border-t">
                    <button type="button" onclick="tutupModal('modalDaftar')" class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-4 py-2 rounded font-bold">Batal</button>
                    <button type="submit" id="btnSimpanDaftar" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded font-bold">Daftar Pengguna</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ⚠️ MASUKKAN URL WEB APP ANDA DI SINI
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxh9pAf8LKl5CU7HFcr5TfKZYy1O5XeFhAX9GgiojzCvB81IOfnNBOuzQoV7zntObI/exec';
        let senaraiData = [];

        // FUNGSI TARIK DATA
        async function muatDataPengguna() {
            const tbody = document.getElementById('isiJadual');
            tbody.innerHTML = `<tr><td colspan="7" class="p-10 text-center font-bold text-indigo-500 animate-pulse">⏳ Sedang menarik data dari pelayan...</td></tr>`;
            
            try {
                const fetchUrl = SCRIPT_URL.includes('?') ? `${SCRIPT_URL}&action=ambilSemuaPengguna` : `${SCRIPT_URL}?action=ambilSemuaPengguna`;
                const response = await fetch(fetchUrl);
                const result = await response.json();

                if (result.status === "BERJAYA") {
                    senaraiData = result.data || [];
                    paparkanJadual(senaraiData);
                } else {
                    tbody.innerHTML = `<tr><td colspan="7" class="p-6 text-center text-red-600 font-bold">❌ Mesej: ${result.mesej}</td></tr>`;
                }
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-red-600 font-bold">⚠️ Ralat Rangkaian / Web App</td></tr>`;
            }
        }

        // FUNGSI PAPAR JADUAL
        function paparkanJadual(data) {
            const tbody = document.getElementById('isiJadual');
            tbody.innerHTML = "";
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-10 text-center text-gray-500 font-medium">Tiada rekod pengguna dijumpai.</td></tr>`;
                return;
            }

            data.forEach(row => {
                const sStatus = row.status.toUpperCase();
                const badgeStatus = sStatus === 'AKTIF' 
                    ? `<span class="bg-green-100 text-green-800 border border-green-300 px-2 py-1 rounded text-xs font-bold">AKTIF</span>` 
                    : `<span class="bg-orange-100 text-orange-800 border border-orange-300 px-2 py-1 rounded text-xs font-bold">${sStatus}</span>`;

                const tr = document.createElement('tr');
                tr.className = "border-b hover:bg-indigo-50 transition";
                
                // Set parameter selamat untuk butang edit
                const btnEdit = `<button onclick="bukaModalKemaskini('${row.ic}', '${row.nama.replace(/'/g, "\\'")}', '${row.jabatan}', '${row.peranan}', '${row.status}')" class="bg-indigo-500 hover:bg-indigo-600 text-white px-3 py-1.5 rounded font-bold shadow-sm transition text-xs">✏️ Edit</button>`;
                const btnReset = `<button onclick="prosesTindakan('resetPassAdmin', '${row.ic}')" class="bg-amber-500 hover:bg-amber-600 text-white px-3 py-1.5 rounded font-bold shadow-sm transition text-xs">🔑 Reset Pass</button>`;
                const btnDelete = `<button onclick="prosesTindakan('padamPenggunaAdmin', '${row.ic}')" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded font-bold shadow-sm transition text-xs">🗑️ Delete</button>`;

                tr.innerHTML = `
                    <td class="p-4 font-mono font-bold text-gray-700">${row.ic}</td>
                    <td class="p-4 font-bold text-gray-800 uppercase">${row.nama}</td>
                    <td class="p-4 font-mono text-gray-500">${row.kata_laluan}</td>
                    <td class="p-4 font-bold text-indigo-700">${row.jabatan}</td>
                    <td class="p-4 font-semibold text-gray-600">${row.peranan}</td>
                    <td class="p-4 text-center">${badgeStatus}</td>
                    <td class="p-4 text-center">
                        <div class="flex justify-center gap-1">
                            ${btnEdit} ${btnReset} ${btnDelete}
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // FUNGSI TINDAKAN (DELETE / RESET PASS)
        function prosesTindakan(actionType, ic) {
            let mesejConfirm = actionType === 'padamPenggunaAdmin' 
                ? `⚠️ AMARAN: Anda pasti mahu PADAM pengguna berserta IC ${ic} ini selamanya?` 
                : `🔑 Anda pasti mahu RESET kata laluan pengguna IC ${ic} kepada nombor IC mereka?`;
            
            if(!confirm(mesejConfirm)) return;

            paparStatusUI('⏳ Memproses...', 'bg-blue-100 text-blue-800 border-blue-200');

            fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: actionType, NO_IC: ic })
            }).then(res => res.json()).then(data => {
                if(data.status === "BERJAYA") {
                    paparStatusUI("✅ " + data.mesej, 'bg-green-100 text-green-800 border-green-200');
                    muatDataPengguna();
                } else {
                    paparStatusUI("❌ Ralat: " + data.mesej, 'bg-red-100 text-red-800 border-red-200');
                }
            }).catch(err => {
                paparStatusUI("⚠️ Gagal menghubungi server.", 'bg-red-100 text-red-800 border-red-200');
            });
        }

        // --- KAWALAN MODAL KEMASKINI ---
        function bukaModalKemaskini(ic, nama, jabatan, peranan, status) {
            document.getElementById('edit_ic').value = ic;
            document.getElementById('papar_edit_ic').value = ic;
            document.getElementById('edit_nama').value = nama;
            document.getElementById('edit_jabatan').value = jabatan;
            document.getElementById('edit_peranan').value = peranan;
            document.getElementById('edit_status').value = status;
            document.getElementById('modalKemaskini').classList.remove('hidden');
        }

        document.getElementById('borangKemaskini').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSimpanKemaskini');
            btn.disabled = true; btn.innerHTML = 'Menyimpan...';

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: "kemaskiniPenggunaAdmin", 
                    NO_IC: document.getElementById('edit_ic').value, 
                    NAMA: document.getElementById('edit_nama').value,
                    JABATAN: document.getElementById('edit_jabatan').value, 
                    PERANAN: document.getElementById('edit_peranan').value,
                    STATUS: document.getElementById('edit_status').value
                })
            }).then(res => res.json()).then(data => {
                btn.disabled = false; btn.innerHTML = 'Simpan';
                tutupModal('modalKemaskini');
                if(data.status === "BERJAYA") {
                    paparStatusUI("✅ Maklumat berjaya dikemaskini!", 'bg-green-100 text-green-800 border-green-200');
                    muatDataPengguna();
                } else {
                    paparStatusUI("❌ Ralat: " + data.mesej, 'bg-red-100 text-red-800 border-red-200');
                }
            });
        });

        // --- KAWALAN MODAL DAFTAR ---
        function bukaModalDaftar() {
            document.getElementById('borangDaftar').reset();
            document.getElementById('modalDaftar').classList.remove('hidden');
        }

        document.getElementById('borangDaftar').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSimpanDaftar');
            btn.disabled = true; btn.innerHTML = 'Mendaftar...';

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: "daftarPengguna", // Pakai fungsi daftar sedia ada dalam Code.gs
                    NO_IC: document.getElementById('daftar_ic').value, 
                    NAMA: document.getElementById('daftar_nama').value,
                    KATA_LALUAN: document.getElementById('daftar_pass').value,
                    JABATAN: document.getElementById('daftar_jabatan').value, 
                    PERANAN: document.getElementById('daftar_peranan').value
                })
            }).then(res => res.json()).then(data => {
                btn.disabled = false; btn.innerHTML = 'Daftar Pengguna';
                tutupModal('modalDaftar');
                if(data.status === "BERJAYA") {
                    paparStatusUI("✅ Pengguna berjaya didaftarkan. Status lalai: Menunggu Pengesahan. Sila Edit untuk Aktifkan.", 'bg-green-100 text-green-800 border-green-200');
                    muatDataPengguna();
                } else {
                    paparStatusUI("❌ Ralat: " + data.mesej, 'bg-red-100 text-red-800 border-red-200');
                }
            });
        });

        // FUNGSI UTILITI
        function tutupModal(id) { document.getElementById(id).classList.add('hidden'); }
        
        function paparStatusUI(teks, warnaClass) {
            const sm = document.getElementById('statusMesejUtama');
            sm.className = `mb-4 p-4 rounded-lg text-center text-sm font-bold shadow-sm border ${warnaClass}`;
            sm.innerText = teks;
            sm.classList.remove('hidden');
            setTimeout(() => sm.classList.add('hidden'), 5000);
        }

        // LOAD MULA-MULA
        window.onload = muatDataPengguna;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pengurusan KPI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
        }

        /* Profil Pengguna Header */
        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .user-info p {
            margin: 5px 0;
            color: #333;
        }

        /* Gaya untuk Tab */
        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
            border-radius: 5px 5px 0 0;
        }
        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 20px;
            transition: 0.3s;
            font-size: 16px;
            font-weight: bold;
        }
        .tab button:hover {
            background-color: #ddd;
        }
        .tab button.active {
            background-color: #0056b3;
            color: white;
        }

        /* Gaya untuk Kandungan Tab */
        .tabcontent {
            display: none;
            padding: 20px;
            border: 1px solid #ccc;
            border-top: none;
            border-radius: 0 0 5px 5px;
            background-color: #fff;
        }

        /* Gaya Butang Tindakan */
        .btn-action {
            background-color: #28a745; /* Hijau */
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
            margin-bottom: 20px;
            font-weight: bold;
            display: inline-block;
        }
        .btn-action:hover { background-color: #218838; }
        
        .btn-primary { background-color: #007bff; }
        .btn-primary:hover { background-color: #0069d9; }

        .btn-warning { background-color: #ffc107; color: #212529; }
        .btn-warning:hover { background-color: #e0a800; }

        .btn-secondary { background-color: #6c757d; }
        .btn-secondary:hover { background-color: #5a6268; }

        .btn-danger { background-color: #dc3545; margin-bottom: 0; margin-right: 0;}
        .btn-danger:hover { background-color: #c82333; }

        /* Butang Baru Pemantauan */
        .btn-monitor { background-color: #003366; color: white; }
        .btn-monitor:hover { background-color: #002244; }

        /* Butang Dashboard Prestasi */
        .btn-prestasi { background-color: #fd7e14; color: white; }
        .btn-prestasi:hover { background-color: #e86e04; }

        #statusUpload {
            font-weight: bold; color: blue; font-size: 14px; margin-left: 10px;
        }
    </style>
    
    <script>
        // KAWALAN AKSES KETAT
        const userLulus = sessionStorage.getItem("userLulus") || "";
        const userPeranan = sessionStorage.getItem("peranan") || "";

        if (userLulus !== "YA") {
            alert("Sila log masuk terlebih dahulu.");
            window.location.href = "login.html"; 
        } else if (
            userPeranan.toUpperCase() !== "PENYELARAS INOVASI" && 
            userPeranan.toUpperCase() !== "PENYELARAS PENYELIDIKAN" && 
            userPeranan.toUpperCase() !== "ADMIN" &&
            userPeranan.toUpperCase() !== "KUPIK"
        ) {
            alert("🛑 Akses Ditolak!");
            window.location.href = "utama.html"; 
        }
    </script>
</head>
<body>

<div class="container">
    
    <div class="user-header">
        <div class="user-info">
            <p><strong>Nama:</strong> <span id="paparNama">Memuatkan...</span></p>
            <p><strong>Peranan:</strong> <span id="paparPeranan" style="color:#0056b3; font-weight:bold;">Memuatkan...</span></p>
        </div>
        <div>
            <button class="btn-action btn-danger" onclick="logKeluar()">🚪 Log Keluar</button>
        </div>
    </div>

    <h2>Pengurusan KPI Pengajar/Penyelidik</h2>

    <div style="text-align: right; margin-bottom: 10px;">
        <button class="btn-action" style="background-color: #17a2b8; margin-bottom: 0;" onclick="window.location.href='pengurusan-data.html'">⚙️ Pengurusan Data Keseluruhan</button>
    </div>

    <div class="tab">
        <button class="tablinks active" onclick="bukaTab(event, 'Penyelidikan')">1 - PENYELIDIKAN</button>
        <button class="tablinks" onclick="bukaTab(event, 'Inovasi')">2 - INOVASI</button>
    </div>

    <div id="Penyelidikan" class="tabcontent" style="display: block;">
        <h3>Bahagian Penyelidikan</h3>
        <p>Sila masukkan maklumat berkaitan geran penyelidikan, penerbitan, dan pembentangan di sini.</p>
        
        <div style="margin-top: 15px;">
            <button class="btn-action btn-prestasi" onclick="window.location.href='dashboard-prestasi.html'">📈 Dashboard Prestasi</button>
            
            <button class="btn-action btn-monitor" onclick="window.location.href='pemantauan-kpi.html'">📊 Pemantauan KPI C-RIE</button>

            <button class="btn-action" style="background-color: #6f42c1;" onclick="window.location.href='dashboard-kpi.html'">📄 Papar & Cetak Laporan</button>

            <button class="btn-action" style="background-color: #343a40;" onclick="window.location.href='tetapan-kpi.html'">⚙️ Tetapan Sasaran KPI</button>
        </div>
    </div>

    <div id="Inovasi" class="tabcontent">
        <h3>Bahagian Inovasi</h3>
        <p>Pengurusan maklumat dan pencapaian Inovasi.</p>

        <div>
            <button class="btn-action btn-prestasi" onclick="window.location.href='dashboard-prestasi.html'">📈 Dashboard Prestasi</button>
            
            <button class="btn-action btn-monitor" onclick="window.location.href='pemantauan-kpi.html'">📊 Pemantauan KPI C-RIE</button>

            <button class="btn-action" style="background-color: #6f42c1;" onclick="window.location.href='dashboard-kpi.html'">📄 Papar & Cetak Laporan</button>

            <button class="btn-action" style="background-color: #343a40;" onclick="window.location.href='tetapan-kpi.html'">⚙️ Tetapan Sasaran KPI</button>
            
            <button class="btn-action btn-primary" onclick="window.location.href='senarai-sijil.html'">E-SIJIL KPI INOVASI</button>
            
            <button class="btn-action btn-warning" onclick="window.location.href='senarai-semak.html'">📋 Borang Senarai Semak</button>

            <button class="btn-action btn-secondary" onclick="document.getElementById('fileTemplate').click()">📤 Upload Template</button>
            
            <input type="file" id="fileTemplate" style="display: none;" onchange="uploadKeDrive(event)">
            
            <span id="statusUpload"></span>
        </div>
    </div>
</div>

<script>
    function bukaTab(evt, namaTab) {
        var i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tabcontent");
        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = "none";
        }
        tablinks = document.getElementsByClassName("tablinks");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(" active", "");
        }
        document.getElementById(namaTab).style.display = "block";
        evt.currentTarget.className += " active";
    }

    // Fungsi Log Keluar
    function logKeluar() {
        if(confirm("Adakah anda pasti mahu log keluar?")) {
            sessionStorage.clear();
            window.location.href = "login.html";
        }
    }

    document.addEventListener("DOMContentLoaded", function() {
        document.getElementById('paparNama').innerText = sessionStorage.getItem("nama") || "Pengguna Sistem";
        document.getElementById('paparPeranan').innerText = sessionStorage.getItem("peranan") || "Tiada Peranan";
    });
</script>

</body>
</html>

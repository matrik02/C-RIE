<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Inovasi - Log Masuk</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center font-sans p-4">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-200 relative">
        <a href="utama.html" class="absolute top-4 left-6 text-sm font-semibold text-blue-600 hover:text-blue-800 hover:underline flex items-center gap-1 transition">
            &larr; Menu Utama
        </a>
        <div class="mt-6"></div>

        <div id="divLogMasuk">
            <div class="text-center mb-8">
                <img src="Logo/Poli_Logo.png" alt="Logo Politeknik" class="mx-auto h-24 w-auto mb-4">
                <h1 class="text-3xl font-bold text-blue-700 mb-2">Sistem Penyelidikan dan Inovasi</h1>
                <p class="text-gray-500">Sila log masuk untuk meneruskan</p>
            </div>

            <div id="statusMesej" class="hidden mb-4 p-3 rounded text-center text-sm font-semibold border"></div>

            <form id="borangLogin" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Peranan</label>
                    <select id="peranan" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50 uppercase">
                        <option value="">⏳ Memuat turun...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Jabatan</label>
                    <select id="jabatan" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50 uppercase">
                        <option value="">⏳ Memuat turun...</option>
                    </select>
                </div>
                
                <div id="ruangKredensial" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">No. Kad Pengenalan</label>
                        <input type="text" id="no_ic" required placeholder="Contoh: 901010015566" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Kata Laluan</label>
                        <input type="password" id="kata_laluan" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <button type="submit" id="btnSubmit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition duration-200 mt-2 shadow-md">
                    Log Masuk
                </button>
            </form>

            <div class="mt-6 text-center text-sm">
                <p class="text-gray-600">Pengguna Baru? <a href="#" onclick="tunjukBorang('divDaftar')" class="text-blue-600 hover:underline font-bold">Daftar Sini</a></p>
                <p class="mt-2"><a href="#" onclick="tunjukBorang('divReset')" class="text-red-500 hover:underline font-semibold">Lupa Kata Laluan?</a></p>
            </div>
        </div>

        <div id="divDaftar" class="hidden">
            <h2 class="text-2xl font-bold text-center text-green-700 mb-6">Pendaftaran Pengguna</h2>
            <div id="statusMesejDaftar" class="hidden mb-4 p-3 rounded text-center text-sm font-semibold border"></div>
            
            <form id="borangDaftar" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Nama Penuh</label>
                    <input type="text" id="daftar_nama" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none uppercase" placeholder="Nama Penuh Anda">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">No. Kad Pengenalan</label>
                    <input type="text" id="daftar_ic" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="Tanpa sengkang ( - )">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Kata Laluan Baru</label>
                    <input type="password" id="daftar_password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Peranan Sistem</label>
                    <select id="daftar_peranan" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none uppercase bg-gray-50">
                        <option value="">⏳ Memuat turun...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Jabatan</label>
                    <select id="daftar_jabatan" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none uppercase bg-gray-50">
                        <option value="">⏳ Memuat turun...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Bahagian / Unit (Pilihan)</label>
                    <select id="daftar_bahagian" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none uppercase bg-gray-50">
                        <option value="">⏳ Memuat turun...</option>
                    </select>
                </div>

                <button type="submit" id="btnSubmitDaftar" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 rounded-lg transition duration-200 mt-2 shadow-md">
                    Hantar Pendaftaran
                </button>
            </form>
            <div class="mt-4 text-center text-sm">
                <a href="#" onclick="tunjukBorang('divLogMasuk')" class="text-gray-500 hover:text-gray-800 hover:underline font-semibold">&larr; Kembali ke Log Masuk</a>
            </div>
        </div>

        <div id="divReset" class="hidden">
            <h2 class="text-2xl font-bold text-center text-red-600 mb-6">Reset Kata Laluan</h2>
            <div id="statusMesejReset" class="hidden mb-4 p-3 rounded text-center text-sm font-semibold border"></div>
            
            <form id="borangReset" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">No. Kad Pengenalan</label>
                    <input type="text" id="reset_ic" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Kata Laluan Baru</label>
                    <input type="password" id="reset_password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
                </div>
                <button type="submit" id="btnSubmitReset" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2.5 rounded-lg transition duration-200 mt-2 shadow-md">
                    Reset & Kemaskini
                </button>
            </form>
            <div class="mt-4 text-center text-sm">
                <a href="#" onclick="tunjukBorang('divLogMasuk')" class="text-gray-500 hover:text-gray-800 hover:underline font-semibold">&larr; Kembali ke Log Masuk</a>
            </div>
        </div>

    </div>

    <script>
        // ⚠️ MASUKKAN URL GOOGLE APPS SCRIPT ANDA DI SINI
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxh9pAf8LKl5CU7HFcr5TfKZYy1O5XeFhAX9GgiojzCvB81IOfnNBOuzQoV7zntObI/exec'; 

        function tunjukBorang(id) {
            document.getElementById('divLogMasuk').classList.add('hidden');
            document.getElementById('divDaftar').classList.add('hidden');
            document.getElementById('divReset').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        // 🌟 SEMBUNYIKAN IC & KATA LALUAN JIKA PERANAN = STAF
        document.getElementById('peranan').addEventListener('change', function() {
            const ruangKredensial = document.getElementById('ruangKredensial');
            const noIcInput = document.getElementById('no_ic');
            const passInput = document.getElementById('kata_laluan');

            if (this.value.toUpperCase() === 'STAF') {
                ruangKredensial.classList.add('hidden');
                noIcInput.required = false;
                passInput.required = false;
            } else {
                ruangKredensial.classList.remove('hidden');
                noIcInput.required = true;
                passInput.required = true;
            }
        });

        // 🌟 MUAT TURUN SENARAI DROPDOWN DARI SHEET 'SISTEM'
        window.addEventListener('DOMContentLoaded', () => {
            fetch(`${SCRIPT_URL}?action=ambilTetapanSenarai`)
            .then(res => res.json())
            .then(data => {
                if (data.status === 'BERJAYA') {
                    let htmlPeranan = '<option value="">-- PILIH PERANAN --</option>';
                    data.PERANAN.forEach(p => htmlPeranan += `<option value="${p}">${p}</option>`);
                    document.getElementById('peranan').innerHTML = htmlPeranan;
                    document.getElementById('daftar_peranan').innerHTML = htmlPeranan;

                    let htmlJabatan = '<option value="">-- PILIH JABATAN --</option>';
                    data.JABATAN.forEach(j => htmlJabatan += `<option value="${j}">${j}</option>`);
                    document.getElementById('jabatan').innerHTML = htmlJabatan;
                    document.getElementById('daftar_jabatan').innerHTML = htmlJabatan;

                    let htmlBahagian = '<option value="">-- TIADA BAHAGIAN --</option>';
                    data.BAHAGIAN.forEach(b => htmlBahagian += `<option value="${b}">${b}</option>`);
                    document.getElementById('daftar_bahagian').innerHTML = htmlBahagian;
                }
            })
            .catch(error => console.error("Gagal menyedut data tetapan."));
        });

        // -------------------------------------------------------------
        // FUNGSI 1: LOG MASUK
        // -------------------------------------------------------------
        document.getElementById('borangLogin').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const mesej = document.getElementById('statusMesej');
            
            const perananDipilih = document.getElementById('peranan').value.toUpperCase();
            const jabatanDipilih = document.getElementById('jabatan').value.toUpperCase();

            btn.disabled = true; btn.innerHTML = 'Menyemak...'; mesej.classList.add('hidden');

            // BYPASS BACKEND UNTUK STAF BIASA (LOGIN SEGERA)
            if (perananDipilih === 'STAF') {
                mesej.className = 'mb-4 p-3 rounded text-center text-sm font-semibold bg-green-100 text-green-800 border border-green-200';
                mesej.innerText = 'Log Masuk Akses Umum Berjaya! Mengalih hala...';
                mesej.classList.remove('hidden');
                
                sessionStorage.setItem("userLulus", "YA");
                sessionStorage.setItem("namaPengguna", "STAF " + jabatanDipilih);
                sessionStorage.setItem("peranan", "STAF");
                sessionStorage.setItem("jabatan", jabatanDipilih);
                sessionStorage.setItem("bahagian", "");
                sessionStorage.setItem("no_ic", ""); // Tiada IC

                setTimeout(() => { window.location.href = "utama.html"; }, 1000);
                return; // Berhenti di sini, tidak perlu hantar ke Google Apps Script
            }

            // JIKA BUKAN STAF, LAKUKAN SEMAKAN DATABASE SEPERTI BIASA
            const payloadData = {
                action: "login",
                PERANAN: perananDipilih,
                JABATAN: jabatanDipilih,
                NO_IC: document.getElementById('no_ic').value,
                KATA_LALUAN: document.getElementById('kata_laluan').value
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payloadData)
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'BERJAYA') {
                    mesej.className = 'mb-4 p-3 rounded text-center text-sm font-semibold bg-green-100 text-green-800 border border-green-200';
                    mesej.innerText = 'Log Masuk Berjaya! Mengalih hala...';
                    mesej.classList.remove('hidden');
                    
                    sessionStorage.setItem("userLulus", "YA");
                    sessionStorage.setItem("namaPengguna", data.nama);
                    sessionStorage.setItem("peranan", data.peranan);
                    sessionStorage.setItem("jabatan", data.jabatan);
                    sessionStorage.setItem("bahagian", data.bahagian || "");
                    sessionStorage.setItem("no_ic", document.getElementById('no_ic').value);

                    setTimeout(() => { window.location.href = "utama.html"; }, 1000);
                } else {
                    mesej.className = 'mb-4 p-3 rounded text-center text-sm font-semibold bg-red-100 text-red-800 border border-red-200';
                    mesej.innerText = data.mesej;
                    mesej.classList.remove('hidden');
                    btn.disabled = false; btn.innerHTML = 'Log Masuk';
                }
            })
            .catch(error => {
                mesej.className = 'mb-4 p-3 rounded text-center text-sm font-semibold bg-red-100 text-red-800 border border-red-200';
                mesej.innerText = 'Ralat sistem / pelayan.';
                mesej.classList.remove('hidden');
                btn.disabled = false; btn.innerHTML = 'Log Masuk';
            });
        });

        // -------------------------------------------------------------
        // FUNGSI 2: DAFTAR PENGGUNA BARU
        // -------------------------------------------------------------
        document.getElementById('borangDaftar').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmitDaftar');
            const mesej = document.getElementById('statusMesejDaftar');
            
            btn.disabled = true; btn.innerHTML = 'Mendaftar...'; mesej.classList.add('hidden');

            const payloadData = {
                action: "tambahPengguna",
                NAMA: document.getElementById('daftar_nama').value.toUpperCase(),
                NO_IC: document.getElementById('daftar_ic').value,
                KATA_LALUAN: document.getElementById('daftar_password').value,
                PERANAN: document.getElementById('daftar_peranan').value,
                JABATAN: document.getElementById('daftar_jabatan').value,
                BAHAGIAN: document.getElementById('daftar_bahagian').value,
                STATUS: "MENUNGGU PENGESAHAN"
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payloadData)
            })
            .then(res => res.json())
            .then(data => {
                mesej.className = `mb-4 p-3 rounded text-center text-sm font-semibold ${data.status==='BERJAYA' ? 'bg-green-100 text-green-800 border border-green-200' : 'bg-red-100 text-red-800 border border-red-200'}`;
                mesej.innerText = data.mesej;
                mesej.classList.remove('hidden');
                
                if (data.status === 'BERJAYA') {
                    document.getElementById('borangDaftar').reset();
                    setTimeout(() => tunjukBorang('divLogMasuk'), 4000);
                }
                btn.disabled = false; btn.innerHTML = 'Hantar Pendaftaran';
            })
            .catch(error => {
                mesej.className = 'mb-4 p-3 rounded text-center text-sm font-semibold bg-red-100 text-red-800 border border-red-200';
                mesej.innerText = 'Ralat sambungan pangkalan data.';
                mesej.classList.remove('hidden');
                btn.disabled = false; btn.innerHTML = 'Hantar Pendaftaran';
            });
        });

        // -------------------------------------------------------------
        // FUNGSI 3: RESET KATA LALUAN
        // -------------------------------------------------------------
        document.getElementById('borangReset').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmitReset');
            const mesej = document.getElementById('statusMesejReset');
            
            btn.disabled = true; btn.innerHTML = 'Mengemaskini...'; mesej.classList.add('hidden');

            fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ 
                    action: "resetPassword", 
                    NO_IC: document.getElementById('reset_ic').value, 
                    KATA_LALUAN: document.getElementById('reset_password').value 
                })
            })
            .then(res => res.json())
            .then(data => {
                mesej.className = `mb-4 p-3 rounded text-center text-sm font-semibold ${data.status==='BERJAYA' ? 'bg-green-100 text-green-800 border border-green-200' : 'bg-red-100 text-red-800 border border-red-200'}`;
                mesej.innerText = data.mesej;
                mesej.classList.remove('hidden');
                
                if (data.status === 'BERJAYA') {
                    document.getElementById('borangReset').reset();
                    setTimeout(() => tunjukBorang('divLogMasuk'), 4000);
                }
                btn.disabled = false; btn.innerHTML = 'Reset & Kemaskini';
            })
            .catch(error => {
                mesej.className = 'mb-4 p-3 rounded text-center text-sm font-semibold bg-red-100 text-red-800 border border-red-200';
                mesej.innerText = 'Ralat sambungan pelayan.';
                mesej.classList.remove('hidden');
                btn.disabled = false; btn.innerHTML = 'Reset & Kemaskini';
            });
        });
    </script>
</body>
</html>

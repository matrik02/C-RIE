<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Inovasi - Log Masuk</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center font-sans p-4">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-200 relative">
        <a href="utama.html" class="absolute top-4 left-6 text-sm font-semibold text-blue-600 hover:text-blue-800 hover:underline flex items-center gap-1 transition">
            &larr; Menu Utama
        </a>
        <div class="mt-6"></div>

        <div id="divLogMasuk">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-blue-700 mb-2">Sistem Inovasi</h1>
                <p class="text-gray-500">Sila log masuk untuk meneruskan</p>
            </div>

            <div id="statusMesej" class="hidden mb-4 p-3 rounded text-center text-sm font-semibold border"></div>

            <form id="borangLogin" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Peranan</label>
                    <select id="peranan" name="peranan" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50">
                        <option value="">⏳ Memuatkan...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Jabatan</label>
                    <select id="jabatan" name="jabatan" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50">
                        <option value="">⏳ Memuatkan...</option>
                    </select>
                </div>
                
                <div id="divIC">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">No. Kad Pengenalan</label>
                    <input type="text" id="no_ic" name="no_ic" required placeholder="Contoh: 901010015566" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                
                <div id="divKataLaluan">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Kata Laluan</label>
                    <input type="password" id="kata_laluan" name="kata_laluan" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <button type="submit" id="btnSubmit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition duration-200 mt-2 shadow-md">
                    Log Masuk
                </button>
            </form>

            <div class="mt-6 text-center text-sm">
                <p class="text-gray-600">Penyelaras Baru? <a href="#" onclick="tunjukBorang('divDaftar')" class="text-blue-600 hover:underline font-bold">Daftar Sini</a></p>
                <p class="mt-2"><a href="#" onclick="tunjukBorang('divReset')" class="text-red-500 hover:underline font-semibold">Lupa Kata Laluan?</a></p>
            </div>
        </div>

        <div id="divDaftar" class="hidden">
            <h2 class="text-2xl font-bold text-center text-green-700 mb-6">Pendaftaran Penyelaras</h2>
            <div id="statusMesejDaftar" class="hidden mb-4 p-3 rounded text-center text-sm font-semibold border"></div>
            <form id="borangDaftar" class="space-y-4">
                <div><label class="block text-sm font-semibold text-gray-700 mb-1">Nama Penuh</label><input type="text" id="daftar_nama" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none"></div>
                <div><label class="block text-sm font-semibold text-gray-700 mb-1">No. Kad Pengenalan</label><input type="text" id="daftar_ic" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none"></div>
                <div><label class="block text-sm font-semibold text-gray-700 mb-1">Jabatan</label><select id="daftar_jabatan" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none bg-gray-50"><option value="">⏳ Memuatkan...</option></select></div>
                <div><label class="block text-sm font-semibold text-gray-700 mb-1">Kata Laluan Baru</label><input type="password" id="daftar_password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none"></div>
                <button type="submit" id="btnSubmitDaftar" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 rounded-lg transition duration-200 mt-2 shadow-md">Daftar</button>
            </form>
            <div class="mt-6 text-center text-sm"><a href="#" onclick="tunjukBorang('divLogMasuk')" class="text-blue-600 hover:underline font-bold">&larr; Kembali ke Log Masuk</a></div>
        </div>

        <div id="divReset" class="hidden">
            <h2 class="text-2xl font-bold text-center text-red-600 mb-6">Reset Kata Laluan</h2>
            <div id="statusMesejReset" class="hidden mb-4 p-3 rounded text-center text-sm font-semibold border"></div>
            <form id="borangReset" class="space-y-4">
                <div><label class="block text-sm font-semibold text-gray-700 mb-1">No. Kad Pengenalan</label><input type="text" id="reset_ic" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none"></div>
                <div><label class="block text-sm font-semibold text-gray-700 mb-1">Kata Laluan Baru</label><input type="password" id="reset_password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none"></div>
                <button type="submit" id="btnSubmitReset" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2.5 rounded-lg transition duration-200 mt-2 shadow-md">Kemaskini Kata Laluan</button>
            </form>
            <div class="mt-6 text-center text-sm"><a href="#" onclick="tunjukBorang('divLogMasuk')" class="text-blue-600 hover:underline font-bold">&larr; Kembali ke Log Masuk</a></div>
        </div>
    </div>

    <script>
        // ⚠️ MASUKKAN URL WEB APP ANDA DI SINI
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxh9pAf8LKl5CU7HFcr5TfKZYy1O5XeFhAX9GgiojzCvB81IOfnNBOuzQoV7zntObI/exec'; 

        function tunjukBorang(idTunjuk) {
            ['divLogMasuk', 'divDaftar', 'divReset'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(idTunjuk).classList.remove('hidden');
        }

        window.onload = function() {
            const dJabatan = document.getElementById('jabatan'), dPeranan = document.getElementById('peranan'), dJabatanDaftar = document.getElementById('daftar_jabatan');
            fetch(`${SCRIPT_URL}?action=ambilTetapan`).then(res => res.json()).then(data => {
                if(data.status === "BERJAYA") {
                    dJabatan.innerHTML = '<option value="">Pilih Jabatan</option>'; dPeranan.innerHTML = '<option value="">Pilih Peranan</option>'; dJabatanDaftar.innerHTML = '<option value="">Pilih Jabatan</option>';
                    data.jabatan.forEach(j => { dJabatan.innerHTML += `<option value="${j}">${j}</option>`; dJabatanDaftar.innerHTML += `<option value="${j}">${j}</option>`; });
                    data.peranan.forEach(p => { dPeranan.innerHTML += `<option value="${p}">${p}</option>`; });
                }
            });
        };

        // KAWALAN PAPARAN: SEMBUNYI KOTAK JIKA STAF
        document.getElementById('peranan').addEventListener('change', function() {
            const divPass = document.getElementById('divKataLaluan'), inputPass = document.getElementById('kata_laluan');
            const divIC = document.getElementById('divIC'), inputIC = document.getElementById('no_ic');

            if (this.value === 'STAF') {
                divPass.classList.add('hidden'); inputPass.removeAttribute('required'); inputPass.value = ''; 
                divIC.classList.add('hidden'); inputIC.removeAttribute('required'); inputIC.value = ''; 
            } else {
                divPass.classList.remove('hidden'); inputPass.setAttribute('required', 'required');
                divIC.classList.remove('hidden'); inputIC.setAttribute('required', 'required');
            }
        });

        // LOGIN SUBMIT EVENT
        document.getElementById('borangLogin').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit'), mesej = document.getElementById('statusMesej');
            const perananDipilih = document.getElementById('peranan').value;
            const jabatanDipilih = document.getElementById('jabatan').value;

            // 🟢 JIKA STAF: BYPASS SEMAKAN DATABASE, TERUS LOG MASUK
            if (perananDipilih === 'STAF') {
                btn.innerHTML = 'Berjaya! Mengalih...';
                sessionStorage.setItem("userLulus", "YA");
                sessionStorage.setItem("namaPengguna", "Warga " + jabatanDipilih);
                sessionStorage.setItem("peranan", "STAF");
                sessionStorage.setItem("jabatan", jabatanDipilih);
                sessionStorage.setItem("no_ic", "STAF"); 
                setTimeout(() => { window.location.href = "utama.html"; }, 500);
                return; // Stop function di sini, jangan hantar ke App Script
            }

            // 🔴 JIKA BUKAN STAF (Penyelaras, dll): HANTAR KE DATABASE UNTUK SEMAKAN
            btn.disabled = true; btn.innerHTML = 'Mengesahkan...'; mesej.classList.add('hidden');

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: "login", 
                    NO_IC: document.getElementById('no_ic').value, 
                    KATA_LALUAN: document.getElementById('kata_laluan').value,
                    JABATAN: jabatanDipilih, 
                    PERANAN: perananDipilih
                })
            }).then(res => res.json()).then(data => {
                if (data.status === 'BERJAYA') {
                    sessionStorage.setItem("userLulus", "YA");
                    sessionStorage.setItem("namaPengguna", data.nama);
                    sessionStorage.setItem("peranan", data.peranan);
                    sessionStorage.setItem("jabatan", data.jabatan);
                    sessionStorage.setItem("no_ic", document.getElementById('no_ic').value); 
                    window.location.href = "utama.html"; 
                } else {
                    mesej.className = 'mb-4 p-3 rounded text-center text-sm font-semibold bg-red-100 text-red-800 border border-red-200';
                    mesej.innerText = data.mesej; mesej.classList.remove('hidden');
                    btn.disabled = false; btn.innerHTML = 'Log Masuk';
                }
            });
        });

        // DAFTAR
        document.getElementById('borangDaftar').addEventListener('submit', function(e) {
            e.preventDefault(); const btn = document.getElementById('btnSubmitDaftar'), mesej = document.getElementById('statusMesejDaftar');
            btn.disabled = true; btn.innerHTML = 'Mendaftar...'; mesej.classList.add('hidden');
            fetch(SCRIPT_URL, {
                method: 'POST', body: JSON.stringify({
                    action: "daftarPengguna", NO_IC: document.getElementById('daftar_ic').value, NAMA: document.getElementById('daftar_nama').value, KATA_LALUAN: document.getElementById('daftar_password').value, JABATAN: document.getElementById('daftar_jabatan').value
                })
            }).then(res => res.json()).then(data => {
                mesej.className = `mb-4 p-3 rounded text-center text-sm font-semibold ${data.status==='BERJAYA' ? 'bg-green-100 text-green-800 border border-green-200' : 'bg-red-100 text-red-800 border border-red-200'}`;
                mesej.innerText = data.mesej; mesej.classList.remove('hidden');
                if (data.status === 'BERJAYA') setTimeout(() => tunjukBorang('divLogMasuk'), 4000);
                btn.disabled = false; btn.innerHTML = 'Daftar';
            });
        });

        // RESET
        document.getElementById('borangReset').addEventListener('submit', function(e) {
            e.preventDefault(); const btn = document.getElementById('btnSubmitReset'), mesej = document.getElementById('statusMesejReset');
            btn.disabled = true; btn.innerHTML = 'Mengemaskini...'; mesej.classList.add('hidden');
            fetch(SCRIPT_URL, {
                method: 'POST', body: JSON.stringify({ action: "resetPassword", NO_IC: document.getElementById('reset_ic').value, KATA_LALUAN: document.getElementById('reset_password').value })
            }).then(res => res.json()).then(data => {
                mesej.className = `mb-4 p-3 rounded text-center text-sm font-semibold ${data.status==='BERJAYA' ? 'bg-green-100 text-green-800 border border-green-200' : 'bg-red-100 text-red-800 border border-red-200'}`;
                mesej.innerText = data.mesej; mesej.classList.remove('hidden');
                if (data.status === 'BERJAYA') setTimeout(() => tunjukBorang('divLogMasuk'), 3000);
                btn.disabled = false; btn.innerHTML = 'Kemaskini Kata Laluan';
            });
        });
    </script>
</body>
</html>

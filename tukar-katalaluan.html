<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tukar Kata Laluan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // KAWALAN AKSES KETAT
        const userLulus = sessionStorage.getItem("userLulus");
        const userPeranan = sessionStorage.getItem("peranan");
        
        if (userLulus !== "YA") {
            alert("Sila log masuk terlebih dahulu.");
            window.location.href = "login.html";
        } else if (userPeranan === "STAF") {
            alert("Akses ditolak! Akaun STAF / Akses Umum tidak mempunyai kata laluan peribadi.");
            window.location.href = "utama.html";
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center font-sans p-4">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-200 relative">
        <a href="utama.html" class="absolute top-4 left-6 text-sm font-semibold text-slate-500 hover:text-slate-800 hover:underline flex items-center gap-1 transition">
            &larr; Batal & Kembali
        </a>
        <div class="mt-8"></div>

        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-slate-800 mb-2">🔑 Tukar Kata Laluan</h1>
            <p class="text-gray-500 text-sm font-medium">Sila masukkan dan sahkan kata laluan baharu anda di bawah.</p>
        </div>

        <div id="statusMesej" class="hidden mb-4 p-3 rounded-lg text-center text-sm font-bold border shadow-sm"></div>

        <form id="borangTukarPass" class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Kata Laluan Baharu</label>
                <input type="password" id="pass_baru" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-500 outline-none transition bg-slate-50">
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Sahkan Kata Laluan Baharu</label>
                <input type="password" id="pass_sahkan" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-500 outline-none transition bg-slate-50">
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-lg transition duration-200 mt-4 shadow-md flex justify-center items-center gap-2">
                💾 Kemaskini Kata Laluan
            </button>
        </form>
    </div>

    <script>
        // ⚠️ MASUKKAN URL GOOGLE APPS SCRIPT ANDA DI SINI
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxh9pAf8LKl5CU7HFcr5TfKZYy1O5XeFhAX9GgiojzCvB81IOfnNBOuzQoV7zntObI/exec'; 

        document.getElementById('borangTukarPass').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const mesej = document.getElementById('statusMesej');
            
            const passBaru = document.getElementById('pass_baru').value;
            const passSahkan = document.getElementById('pass_sahkan').value;

            // Semak jika kata laluan sepadan
            if(passBaru !== passSahkan) {
                mesej.className = 'mb-4 p-3 rounded-lg text-center text-sm font-bold bg-red-100 text-red-800 border border-red-200';
                mesej.innerText = '❌ Kata laluan tidak sepadan! Sila pastikan ejaan betul.';
                mesej.classList.remove('hidden');
                return;
            }

            btn.disabled = true; 
            btn.innerHTML = '⏳ Sedang Menyimpan...'; 
            mesej.classList.add('hidden');

            const payloadData = {
                action: "resetPassword",
                NO_IC: sessionStorage.getItem('no_ic'), // Ambil secara auto dari memori login
                KATA_LALUAN: passBaru
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payloadData)
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'BERJAYA') {
                    mesej.className = 'mb-4 p-3 rounded-lg text-center text-sm font-bold bg-green-100 text-green-800 border border-green-200';
                    mesej.innerText = '✅ Kata laluan berjaya ditukar! Anda akan dibawa ke menu utama.';
                    mesej.classList.remove('hidden');
                    document.getElementById('borangTukarPass').reset();
                    
                    setTimeout(() => { window.location.href = "utama.html"; }, 2500);
                } else {
                    mesej.className = 'mb-4 p-3 rounded-lg text-center text-sm font-bold bg-red-100 text-red-800 border border-red-200';
                    mesej.innerText = '❌ Ralat: ' + data.mesej;
                    mesej.classList.remove('hidden');
                    btn.disabled = false; btn.innerHTML = '💾 Kemaskini Kata Laluan';
                }
            })
            .catch(error => {
                mesej.className = 'mb-4 p-3 rounded-lg text-center text-sm font-bold bg-red-100 text-red-800 border border-red-200';
                mesej.innerText = '⚠️ Ralat sistem atau pelayan.';
                mesej.classList.remove('hidden');
                btn.disabled = false; btn.innerHTML = '💾 Kemaskini Kata Laluan';
            });
        });
    </script>
</body>
</html>
